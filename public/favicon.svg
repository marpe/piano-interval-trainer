<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#141414"/>

  <!-- White piano key -->
  <rect x="7" y="6" width="10" height="20" rx="2" fill="#e8e8e8"/>

  <!-- Black piano key overlapping -->
  <rect x="13" y="6" width="7" height="13" rx="1.5" fill="#1a1a1a"/>

  <!-- Music note (eighth note) -->
  <circle cx="22" cy="23" r="2.5" fill="#e94560"/>
  <rect x="24.3" y="14" width="1.8" height="10" rx="0.9" fill="#e94560"/>
  <!-- Flag on the note stem -->
  <path d="M26.1 14 Q30 15.5 26.1 19" stroke="#e94560" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
